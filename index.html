<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>House of LouLou's — Door</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0eb;
    --dark: #1a1a1a;
    --blue: #162B3B;
    --warm: #8c7b6b;
    --accent: #c9a96e;
    --green: #34c759;
    --red: #c0392b;
    --border: rgba(0,0,0,0.08);
    --card: #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#f2ede8; font-family:'Instrument Serif',Georgia,serif; color:var(--dark); min-height:100vh; }

  /* ── EVENT SELECTOR ── */
  .ev-screen { position:fixed; inset:0; background:var(--blue); z-index:400; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 28px; }
  .ev-logo { height:46px; width:auto; margin-bottom:8px; }
  .ev-sub { font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:44px; }
  .ev-list { width:100%; max-width:320px; display:flex; flex-direction:column; gap:10px; }
  .ev-item { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:18px 20px; cursor:pointer; transition:all 0.18s; }
  .ev-item:active { background:rgba(255,255,255,0.1); border-color:var(--accent); }
  .ev-name { font-family:'Instrument Serif',serif; font-size:20px; color:#fff; font-style:italic; }
  .ev-date { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.45); margin-top:4px; font-family:sans-serif; }

  /* ── MAIN APP ── */
  #app { display:none; }
  .list-header { background:var(--blue); position:sticky; top:0; z-index:100; }
  .list-top { display:flex; align-items:center; justify-content:space-between; padding:14px 18px 10px; }
  .logo-img { height:28px; width:auto; }
  .switch-btn { background:none; border:1px solid rgba(255,255,255,0.2); border-radius:7px; color:rgba(255,255,255,0.6); font-size:10px; letter-spacing:0.1em; padding:6px 11px; cursor:pointer; font-family:sans-serif; }
  .toolbar { display:flex; gap:8px; padding:0 16px 12px; }
  .search-wrap { flex:1; position:relative; }
  .search-input { width:100%; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:9px 12px 9px 32px; font-size:13px; color:#fff; outline:none; font-family:'Instrument Serif',serif; font-style:italic; }
  .s-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,0.3); font-size:13px; pointer-events:none; }
  .hbtn { background:none; border:1px solid rgba(255,255,255,0.2); border-radius:8px; padding:8px 13px; font-size:11px; letter-spacing:0.06em; color:#fff; cursor:pointer; white-space:nowrap; font-family:sans-serif; }
  .hbtn.
