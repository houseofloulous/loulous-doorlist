<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
  :root { --blue: #162B3B; --cream: #f5f0eb; --accent: #c9a96e; --green: #34c759; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--cream); font-family:'Instrument Serif',serif; color:#1a1a1a; min-height:100vh; }

  /* ── LOGO ── */
  .logo-img, .ev-logo { mix-blend-mode: screen; display: block; filter: brightness(1.1); }

  /* ── SCREENS ── */
  #evScreen { position:fixed; inset:0; background:var(--blue); z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
  #app { display:none; }
  
  /* ── HEADER ── */
  .header { background:var(--blue); position:sticky; top:0; z-index:100; padding:10px 18px 15px; }
  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .logo-img { height:50px; width:auto; }
  .switch-btn { background:none; border:1px solid rgba(255,255,255,0.2); border-radius:7px; color:rgba(255,255,255,0.6); font-size:10px; padding:6px 11px; cursor:pointer; font-family:sans-serif; text-transform:uppercase; }
  .search-input { width:100%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:12px 12px 12px 35px; font-size:16px; color:#fff; outline:none; font-family:'Instrument Serif',serif; font-style:italic; }

  /* ── GRID ── */
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:14px; }
  .card { background:white; border-radius:10px; overflow:hidden; cursor:pointer; position:relative; box-shadow:0 1px 4px rgba(0,0,0,0.07); }
  .card-photo { width:100%; aspect-ratio:1; object-fit:cover; display:block; background:#e8e2da; }
  .card-name { font-size:11px; padding:8px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .in-badge { position:absolute; top:6px; right:6px; background:var(--blue); border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; border:1px solid rgba(255,255,255,0.2); }

  /* ── DETAIL ── */
  #detailView { display:none; position:fixed; inset:0; background:var(--cream); z-index:200; overflow-y:auto; }
  .detail-head { background:var(--blue); padding:20px 0 50px; text-align:center; position:relative; }
  .back-btn { background:none; border:none; color:#fff; cursor:pointer; padding:14px 18px; position:absolute; left:0; top:0; }
  .detail-name { font-size:32px; color:#fff; font-style:italic; margin-top:20px; }
  .det-row { display:flex; align-items:center; justify-content:space-between; padding:16px; border-bottom:1px solid rgba(0,0,0,0.05); background:white; }
  
  /* ── TOGGLES ── */
  .toggle { position:relative; width:51px; height:31px; }
  .toggle input { opacity:0; width:0; height:0; }
  .slider { position:absolute; cursor:pointer; inset:0; background:#e0dad3; border-radius:31px; transition:0.2s; }
  .slider:before { content:''; position:absolute; width:25px; height:25px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:0.2s; }
  .toggle input:checked + .slider { background:var(--green); }
  .toggle input:checked + .slider:before { transform:translateX(20px); }
  .save-btn { width:calc(100% - 32px); margin:16px; background:var(--blue); color:#fff; border:none; border-radius:12px; padding:18px; cursor:pointer; font-weight:bold; font-size:16px; }
