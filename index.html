<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>House of LouLou's — Door</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0eb;
    --dark: #1a1a1a;
    --blue: #162B3B;
    --warm: #8c7b6b;
    --accent: #c9a96e;
    --green: #34c759;
    --card: #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#f2ede8; font-family:'Instrument Serif',Georgia,serif; color:var(--dark); min-height:100vh; }

  /* ── LOGO & THEME ── */
  .logo-img, .ev-logo { mix-blend-mode: screen; display: block; filter: brightness(1.1); }

  /* ── SCREENS ── */
  #evScreen { position:fixed; inset:0; background:var(--blue); z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
  #app { display:none; }
  
  /* ── HEADER ── */
  .list-header { background:var(--blue); position:sticky; top:0; z-index:100; padding-bottom:12px; }
  .list-top { display:flex; align-items:center; justify-content:space-between; padding:10px 18px; }
  .logo-img { height:50px; width:auto; }
  .switch-btn { background:none; border:1px solid rgba(255,255,255,0.2); border-radius:7px; color:rgba(255,255,255,0.6); font-size:10px; letter-spacing:0.1em; padding:6px 11px; cursor:pointer; font-family:sans-serif; text-transform:uppercase; }
  .search-wrap { padding:0 16px; position:relative; }
  .search-input { width:100%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px 12px 10px 32px; font-size:16px; color:#fff; outline:none; font-family:'Instrument Serif',serif; font-style:italic; }
  .s-icon { position:absolute; left:26px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,0.3); font-size:14px; }

  /* ── GRID ── */
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:14px; }
  .card { background:var(--card); border-radius:10px; overflow:hidden; cursor:pointer; position:relative; box-shadow:0 1px 4px rgba(0,0,0,0.07); }
  .card-photo { width:100%; aspect-ratio:1; object-fit:cover; display:block; background:#e8e2da; }
  .card-name { font-size:11px; color:var(--dark); padding:8px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .in-badge { position:absolute; top:6px; right:6px; background:var(--blue); border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; border:1px solid rgba(255,255,255,0.2); }

  /* ── DETAIL ── */
  #detailView { display:none; position:fixed; inset:0; background:#f2ede8; z-index:200; overflow-y:auto; }
  .detail-head { background:var(--blue); padding:20px 0 50px; text-align:center; position:relative; }
  .back-btn { background:none; border:none; color:#fff; cursor:pointer; padding:14px 18px; font-size:14px; position:absolute; left:0; top:0; font-family:sans-serif; }
  .detail-name { font-size:32px; color:#fff; font-style:italic; margin-top:20px; }
  .det-cards { padding:16px; display:flex; flex-direction:column; gap:12px; }
  .det-card { background:var(--card); border-radius:14px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .det-row { display:flex; align-items:center; justify-content:space-between; padding:16px; border-bottom:1px solid rgba(0,0,0,0.05); }
  
  /* ── TOGGLES ── */
  .toggle { position:relative; width:51px; height:31px; }
  .toggle input { opacity:0; width:0; height:0; }
  .slider { position:absolute; cursor:pointer; inset:0; background:#e0dad3; border-radius:31px; transition:0.2s; }
  .slider:before { content:''; position:absolute; width:25px; height:25px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:0.2s; }
  .toggle input:checked + .slider { background:var(--green); }
  .toggle input:checked + .slider:before { transform:translateX(20px); }
  .save-btn { width:100%; background:var(--blue); color:#fff; border:none; border-radius:12px; padding:18px; cursor:pointer; font-weight:bold; font-size:16px; margin-top:10px; }

  /* ── EVENT LIST ── */
  .ev-btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); color:white; padding:18px; border-radius:12px; width:100%; max-width:300px; margin-bottom:10px; cursor:pointer; text-align:center; font-size:20px; font-style:italic; }
</style>
</head>
<body>

<div id="evScreen">
  <img class="ev-logo" src="https://raw.githubusercontent.com/houseofloulous/loulous-doorlist/main/LL%20white%20logo%20name%20only.png" height="120">
  <div style="color:rgba(255,255,255,0.4); margin:20px 0 30px; font-size:10px; letter-spacing:3px; font-family:sans-serif;">SELECT DOOR LIST</div>
  <div id="evList" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
</div>

<div id="app">
  <div class="list-header">
    <div class="list-top">
      <img class="logo-img" src="https://raw.githubusercontent.com/houseofloulous/loulous-doorlist/main/LL%20white%20logo%20name%20only.png">
      <button class="switch-btn" onclick="location.reload()">Switch Event</button>
    </div>
    <div class="search-wrap">
      <span class="s-icon">⌕</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Find guest..." oninput="render()">
    </div>
  </div>
  <div id="main"></div>
</div>

<div id="detailView">
  <div id="detailContent"></div>
</div>

<script>
const TOKEN='patY9tc4TkNCBGoN1.9b13a0a30620b68b57200f8cef0f4feb2ebbc93bd84ceb6f6637fcd051885a59';
const BASE='appY6p2HwRtDmOvAf';

const EVENTS=[
  {name:"L'Atelier",      table:"3/28 Door List"},
  {name:"Do Not Disturb", table:"4/18 Door List"},
  {name:"Obscura",        table:"Obscura Premiere"},
];

let guests=[], curTable='', curG=null;

function init() {
  document.getElementById('evList').innerHTML = EVENTS.map((e,i)=> 
    `<div class="ev-btn" onclick="pickEv(${i})">${e.name}</div>`
  ).join('');
}

async function pickEv(i) {
  curTable = EVENTS[i].table;
  document.getElementById('evScreen').style.display='none';
  document.getElementById('app').style.display='block';
  await load();
}

async function api(path, opts={}){
  const r = await fetch(`https://api.airtable.com/v0/${BASE}/${encodeURIComponent(curTable)}${path}`,{
    ...opts, headers:{Authorization:'Bearer '+TOKEN,'Content-Type':'application/json',...(opts.headers||{})}
  });
  return r.json();
}

async function load(){
  const main = document.getElementById('main');
  main.innerHTML = '<div style="text-align:center; padding-top:100px; color:var(--warm)">Refreshing list...</div>';
  
  const data = await api('?maxRecords=100&view=Grid%20view');
  
  if(data.records) {
    guests = data.records.map(r => ({
      id: r.id,
      name: r.fields['Full Name'] || 'Unknown',
      checkedIn: !!r.fields['Checked In'],
      photo: r.fields['Photo'] ? r.fields['Photo'][0].url : '',
      nda: r.fields['NDA'] || 'No',
      patron: !!r.fields['Patron']
    }));
    render();
  } else {
    main.innerHTML = '<div style="text-align:center; padding:50px;">Error loading data. Check table name.</div>';
  }
}

function render(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const list = guests.filter(g => g.name.toLowerCase().includes(q));
  
  document.getElementById('main').innerHTML = `<div class="grid">` + 
    list.map(g => `
      <div class="card" onclick="openDetail('${g.id}')">
        ${g.checkedIn ? '<div class="in-badge">✓</div>' : ''}
        <img class="card-photo" src="${g.photo || 'https://via.placeholder.com/150?text=No+Photo'}">
        <div class="card-name">${g.name}</div>
      </div>
    `).join('') + `</div>`;
}

function openDetail(id){
  curG = guests.find(g => g.id === id);
  document.getElementById('app').style.display='none';
  document.getElementById('detailView').style.display='block';
  
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-head">
      <button class="back-btn" onclick="closeDetail()">‹ Guests</button>
      <div class="detail-name">${curG.name}</div>
    </div>
    <div class="det-cards">
      <div class="det-card">
        <div class="det-row">Checked In <label class="toggle"><input type="checkbox" id="dCI" ${curG.checkedIn?'checked':''}><span class="slider"></span></label></div>
        <div class="det-row">Patron <label class="toggle"><input type="checkbox" id="dPat" ${curG.patron?'checked':''}><span class="slider"></span></label></div>
        <div class="det-row">NDA Signed <label class="toggle"><input type="checkbox" id="dNDA" ${curG.nda==='Signed'?'checked':''}><span class="slider"></span></label></div>
      </div>
      <button class="save-btn" id="saveBtn" onclick="save()">Save Updates</button>
    </div>`;
}

async function save(){
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Saving...';
  btn.disabled = true;

  const isPatron = document.getElementById('dPat').checked;
  const isCheckedIn = document.getElementById('dCI').checked;
  const isNDA = document.getElementById('dNDA').checked;

  const fields = {
    'Checked In': isCheckedIn,
    'Patron': isPatron,
    'NDA': isNDA ? 'Signed' : 'No',
    'Wristband': isPatron ? 'Gold' : null // Auto-set Gold for Patrons
  };

  await api('/' + curG.id, { method: 'PATCH', body: JSON.stringify({ fields }) });
  await load();
  closeDetail();
}

function closeDetail(){
  document.getElementById('detailView').style.display='none';
  document.getElementById('app').style.display='block';
}

init();
</script>
</body>
</html>
